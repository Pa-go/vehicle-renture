<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Renture | Loading...</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      /* Deep Renture Blue */
      background: #001F3F; 
      overflow: hidden;
    }

    .logo {
      width: 350px; 
      max-width: 80%;
      /* floating and glowing animations */
      animation: floatLogo 3.5s ease-in-out infinite, glowEffect 2.5s ease-in-out infinite;
      filter: drop-shadow(0 0 20px rgba(255, 255, 255, 0.3));
    }

    @keyframes floatLogo {
      0% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-15px) scale(1.05); }
      100% { transform: translateY(0) scale(1); }
    }

    @keyframes glowEffect {
      0%, 100% {
        filter: drop-shadow(0 0 15px rgba(250, 204, 21, 0.4)); /* Renture Yellow tint */
      }
      50% {
        filter: drop-shadow(0 0 35px rgba(250, 204, 21, 0.7));
      }
    }
  </style>
</head>
<body>
  <img src="../assets/images/logo.png" alt="Renture Logo" class="logo" onerror="this.src='https://placehold.co/350x150?text=RENTURE'"/>

  <script>
    // Redirect to home page after the animation cycle
    setTimeout(() => {
      // FIXED: Pointing to home.php which is our main page
      window.location.href = "home.php"; 
    }, 3500);
  </script>
</body>
</html>
